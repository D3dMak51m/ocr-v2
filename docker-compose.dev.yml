x-airflow-common:
  &airflow-common
  build: ./airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-your-secret-key-here-change-this}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    FAST_API_BASE_URL: ${FAST_API_BASE_URL}
    RABBITMQ_HOST: rabbitmq
    RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
    RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    # Logging configuration
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__SCHEDULER__CHILD_PROCESS_LOG_DIRECTORY: /opt/airflow/logs/scheduler
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
  networks:
    - app-network

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    networks:
      - app-network

  backend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8282:8282"
    depends_on:
      - rabbitmq
    restart: unless-stopped
    environment:
      - API_TOKEN=${API_TOKEN}
      - AIRFLOW_BASE_URL=${AIRFLOW_BASE_URL}
    volumes:
      - ./app:/app
      - ${DATA_PATH:-/var/lib/datagaze/.data/data}:/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '8G'
    networks:
      - app-network

  worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: backend.Dockerfile
    depends_on:
      - rabbitmq
    command: ["python", "airflow_worker.py"]
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
    networks:
      - app-network
 
  tika-server:
    build:
      context: ./tika-app
      dockerfile: Dockerfile
    container_name: tika-server
    ports:
      - "9998:9998"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '8G'
    networks:
      - app-network

  postgres:
    image: postgres:15
    container_name: airflow_db
    ports:
      - "5433:5432"
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
  
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    entrypoint: >
      /bin/bash -c "
        # Create logs directory with proper permissions
        mkdir -p /opt/airflow/logs/scheduler &&
        chmod -R 755 /opt/airflow/logs &&
        
        # Run migrations
        airflow db migrate &&
        
        # Create user if doesn't exist
        if ! airflow users list | grep -q ${AIRFLOW_USER}; then
          airflow users create --username ${AIRFLOW_USER} --password ${AIRFLOW_PASSWORD} --firstname ${AIRFLOW_FIRSTNAME} --lastname ${AIRFLOW_LASTNAME} --role Admin --email ${AIRFLOW_EMAIL};
        else
          echo 'User already exists, skipping creation.';
        fi
      "
    restart: on-failure 
    networks:
      - app-network

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    depends_on:
      - airflow-init
    environment:
      <<: *airflow-common-env
    ports:
      - "8080:8080"
    restart: unless-stopped
    command: ["airflow", "webserver"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    depends_on:
      - airflow-webserver
    environment:
      <<: *airflow-common-env
    restart: unless-stopped
    command: ["airflow", "scheduler"]
    healthcheck:
      test: ["CMD", "airflow", "version"] 
      # test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  airflow-logs: